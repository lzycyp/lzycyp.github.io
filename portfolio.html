<script type="text/javascript">
	$(document).ready(function(){
        $.ajax({
            type: "GET",
            url: "https://bbs.jygong.com/cyp.php",
            contentType:"application/json; charset=utf-8",
            dataType:"jsonp",
            jsonp: "callbackparam",
            success: function(data){
                console.log(data);
                var projectList = data.project;
                var listHtml = "";
                for(var i = 0; i <projectList.length; i++ ){
                    var tempHtml = "";
                    tempHtml='<li class="'+projectList[i].type+'"> <div class="flip-container"> <div class="flipper">'+
                            '<a href="'+projectList[i].imgBig+'" title="'+projectList[i].title+'" rel="portfolio" class="folio">'+
                            '<div class="front">  <img src="'+projectList[i].imgSmall+'" alt=""> </div> <div class="back">'+
                            '<h4>'+projectList[i].head+'</h4><p> '+projectList[i].desc+'</p> </div></a></div></div></li>';
                    listHtml+=tempHtml;
                }
                $('#portfolio-list').html(listHtml);
                $('.flip-container').hover(function(){
                    $(this).addClass('flip');
                },function(){
                    $(this).removeClass('flip');
                });
            },
            error: function(){
                alert('fail');
            }
        });
	});
</script>
